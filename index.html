<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM NO SIGNAL</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
    overflow: hidden;
}

/* 📺 ШИПЯЩИЙ ЭФФЕКТ (как ТВ без сигнала) */
.tv {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    z-index: 0;
}

/* шум */
.tv::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: url("https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif");
    opacity: 0.08;
    mix-blend-mode: screen;
    animation: noiseMove 0.2s infinite;
}

/* скан линии */
.tv::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 2px,
        transparent 4px
    );
    animation: flicker 0.12s infinite;
}

@keyframes noiseMove {
    0% { transform: translate(0,0); }
    50% { transform: translate(-2px,2px); }
    100% { transform: translate(2px,-2px); }
}

@keyframes flicker {
    0% { opacity: 0.9; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* контент */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 20px;
}

img {
    width: 80%;
    max-width: 280px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 0 25px rgba(255,255,255,0.3);
    display: none;
}

#text {
    margin-top: 20px;
    font-size: 14px;
    white-space: pre-line;
    text-align: left;
    display: inline-block;
}
</style>

</head>

<body>

<div class="tv"></div>

<div class="container">

<h2>SYSTEM BREACH DETECTED</h2>

<img id="photo" src="lola.jpg">

<div id="text"></div>

</div>

<script>

const lines = [
"NO SIGNAL...",
"RECOVERING DATA...",
"",
"TARGET IDENTIFIED:",
"María Dolores Rosa (Lola)",
"",
"Scanning...",
"✔ Emotional stability: dangerous",
"✔ Beauty level: abnormal",
"✔ Presence: unexplainable",
"",
"System instability detected...",
"",
"ERROR 404: defects not found ❤️",
"",
"Final result:",
"She cannot be processed...",
"She is the interference of the system 💖"
];

let i = 0;
const text = document.getElementById("text");
const photo = document.getElementById("photo");

function typeText() {
    if (i < lines.length) {
        text.innerHTML += lines[i] + "\n";
        i++;

        if (i === 3) {
            photo.style.display = "block";
        }

        setTimeout(typeText, 450);
    }
}

typeText();

</script>

</body>
</html>
