<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA ACTIVO</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
}

.tv {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;

    background: black;

    background-image:
        repeating-linear-gradient(
            0deg,
            rgba(255,255,255,0.05),
            rgba(255,255,255,0.05) 1px,
            transparent 2px,
            transparent 4px
        ),
        repeating-linear-gradient(
            90deg,
            rgba(255,255,255,0.03),
            rgba(255,255,255,0.03) 1px,
            transparent 3px
        );

    animation: flicker 0.12s infinite;
}

@keyframes flicker {
    0% { opacity: 0.9; transform: translate(0,0); }
    50% { opacity: 0.4; transform: translate(1px,-1px); }
    100% { opacity: 1; transform: translate(-1px,1px); }
}

.container {
    position: relative;
    z-index: 2;
    padding: 20px;
    max-width: 600px;
    margin: auto;
    text-align: center;
}

img {
    width: 100%;
    max-width: 280px;
    display: none;
    margin: 20px auto;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

#text {
    white-space: pre-line;
    font-size: 14px;
    margin-top: 20px;
    text-align: left;
}
</style>

</head>

<body>

<div class="tv"></div>

<div class="container">

<h2>ACCESO AL SISTEMA...</h2>

<img id="photo" src="lola.jpg">

<div id="text"></div>

</div>

<script>

const lines = [
"Conectando al sistema...",
"Saltando protocolos de seguridad...",
"",
"OBJETIVO ENCONTRADO:",
"María Dolores Rosa (Lola)",
"",
"Analizando perfil...",
"✔ Energía única detectada",
"✔ Nivel de carisma: peligroso 😳",
"✔ Personalidad: irrepetible",
"",
"Buscando defectos...",
"",
"ERROR...",
"",
"No se encontraron defectos ❤️",
"",
"Resultado final:",
"Lola no pertenece al sistema...",
"ella es la anomalía más hermosa 💖"
];

let i = 0;
const text = document.getElementById("text");
const photo = document.getElementById("photo");

function typeWriter() {
    if (i < lines.length) {
        text.innerHTML += lines[i] + "\n";
        i++;

        if (i === 3) {
            photo.style.display = "block";
        }

        setTimeout(typeWriter, 500);
    }
}

typeWriter();

</script>

</body>
</html>
